[package]
name = "mtp-filler"
version = "0.1.3"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
bytesize = "2.1.0"
chrono = "0.4.42"
dialoguer = "0.12.0"
fastrand = "2.3.0"
indicatif = "0.18.0"
uuid = { version = "1.18.1", features = ["v4"] }

[target.'cfg(windows)'.dependencies]
winmtp = { git = "https://github.com/jannikac/winmtp.git", branch = "add-write-streams" }
widestring = "1.2.1"
dunce = "1.0.5"
windows = { version = "0.52", features = [
  "Win32_System_Com",
  "Win32_Devices_PortableDevices",
] }

[target.'cfg(unix)'.dependencies]
libmtp-rs = "0.7.7"
