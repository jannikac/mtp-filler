name: Build and Release

on:
  push:
    branches-ignore:
      - main
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get install -y pkg-config make gawk libfontconfig1-dev
      - name: Build
        run: cargo build --release
      - name: Rename binary
        if: startsWith(github.ref, 'refs/tags/')
        run: mv target/release/mtp-filler target/release/mtp-filler-${{ github.ref_name }}-linux-x86_64
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/mtp-filler-${{ github.ref_name }}-linux-x86_64

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (Windows)
        run: cargo build --target x86_64-pc-windows-msvc --release

      - name: Rename binary
        if: startsWith(github.ref, 'refs/tags/')
        run: move target\x86_64-pc-windows-msvc\release\mtp-filler.exe target\x86_64-pc-windows-msvc\release\mtp-filler-${{ github.ref_name }}.exe

      - name: Release (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: target/x86_64-pc-windows-msvc/release/mtp-filler-${{ github.ref_name }}.exe

  build-macos-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install prerequisites (macOS arm64)
        run: |
          brew update
          brew install libmtp pkg-config

      - name: Build (macOS arm64)
        run: cargo build --release

      - name: Rename binary
        if: startsWith(github.ref, 'refs/tags/')
        run: mv target/release/mtp-filler target/release/mtp-filler-${{ github.ref_name }}-macos-arm64

      - name: Release (macOS arm64)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/mtp-filler-${{ github.ref_name }}-macos-arm64

  build-macos-intel:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4
      - name: Install prerequisites (macOS x86_64)
        run: |
          brew update
          brew install libmtp pkg-config

      - name: Build (macOS x86_64)
        run: cargo build --release

      - name: Rename binary
        if: startsWith(github.ref, 'refs/tags/')
        run: mv target/release/mtp-filler target/release/mtp-filler-${{ github.ref_name }}-macos-x86_64

      - name: Release (macOS x86_64)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/mtp-filler-${{ github.ref_name }}-macos-x86_64
